<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  /* ── Global ─────────────────────────────────── */

  /* Navbar — sharp glass (dark mode only) */
  .navbar {
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  .dark .navbar {
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    background-color: rgba(9, 9, 11, 0.8) !important;
  }

  /* Navbar menu text size */
  .navbar-nav a {
    font-size: 1.05rem !important;
    letter-spacing: 0.01em;
  }


  /* Cards — polished surface + teal glow on hover */
  .card {
    transition: box-shadow 0.3s ease, border-color 0.3s ease;
    border: 1px solid rgba(20, 184, 166, 0.08);
  }
  .card:hover {
    box-shadow: 0 0 40px rgba(20, 184, 166, 0.18);
    border-color: rgba(20, 184, 166, 0.25);
  }

  /* Project card image — subtle zoom on hover */
  .card img {
    transition: transform 0.4s ease;
  }
  .card:hover img {
    transform: scale(1.03);
  }

  /* Publication citation view — subtle left border */
  .pub-list-item {
    border-left: 2px solid rgba(20, 184, 166, 0.25);
    padding-left: 1rem;
    transition: border-color 0.2s;
  }
  .pub-list-item:hover { border-left-color: #14b8a6; }

  /* ── Hero / Bio section ──────────────────────── */

  /* Single teal glow on hero */
  .resume-biography {
    background: radial-gradient(ellipse 100% 55% at 50% -5%, rgba(20, 184, 166, 0.13), transparent 70%);
  }

  /* Avatar — teal ring */
  .avatar {
    border: 2px solid rgba(20, 184, 166, 0.55) !important;
  }

  /* Name — light mode default: dark-to-teal gradient */
  .resume-biography h1 {
    letter-spacing: -0.035em;
    background: linear-gradient(135deg, #0f172a 55%, #0d9488);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Name — dark mode: plain white */
  .dark .resume-biography h1 {
    background: none !important;
    -webkit-background-clip: unset !important;
    background-clip: unset !important;
    -webkit-text-fill-color: #ffffff !important;
    color: #ffffff;
  }

  /* Role label — refined weight */
  .resume-biography p.text-2xl {
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* Social icon buttons — teal on hover only */
  .resume-biography a.w-12 {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

  .resume-biography a.w-12:hover {
    color: #2dd4bf !important;
  }
</style>
